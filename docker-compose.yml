services:
  postgres:
    image: postgres:15-alpine
    container_name: courtbooking-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: courtbooking
      POSTGRES_PASSWORD: courtbooking123
      POSTGRES_DB: courtbooking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U courtbooking" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
